id: denoise-nind
name: "denoise nind"
description: "UtNet denoiser trained on NIND dataset"
task: denoise
version: "1.1"
tiling: true
type: single
dep_group: nind

attributes:
  input_sizes: [2040, 1528, 1016, 760, 504, 376, 248]

repo:
  submodule: vendor/nind-denoise

checkpoints:
  - url: "https://drive.google.com/file/d/1n0QgcdinbSVBZb1QdngDuQyjfj6xYsUv/view?usp=drive_link"
    path: "temp/denoise-nind/generator_650.pt"

model_card:
  long_description: "Image denoiser trained on the Natural Image Noise Dataset (NIND) from Wikimedia Commons"
  scope: "single-image denoising"
  author: "Benoit Brummer (University of Louvain)"
  source: "https://github.com/trougnouf/nind-denoise"
  paper: "https://arxiv.org/abs/1906.00270"
  license: "GPL-3.0"
  training_data: "real-world noise/clean pairs photographed by authors, published on Wikimedia Commons"
  training_data_license: "CC BY 4.0 / CC0 (per-image, Wikimedia Commons)"
  notes: "all components publicly available under open licenses"

convert:
  - script: convert.py
    args:
      checkpoint: "{temp}/generator_650.pt"
      output: "{output}/model.onnx"
      opset: 17
      fp16: false
