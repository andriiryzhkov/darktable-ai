id: upscale-bsrgan
name: "upscale bsrgan"
description: "BSRGAN 2x and 4x blind super-resolution"
task: upscale
tiling: true
type: multi
dep_group: bsrgan

checkpoints:
  - url: "https://github.com/cszn/KAIR/releases/download/v1.0/BSRGAN.pth"
    path: "temp/upscale-bsrgan/BSRGAN.pth"
  - url: "https://github.com/cszn/KAIR/releases/download/v1.0/BSRGANx2.pth"
    path: "temp/upscale-bsrgan/BSRGANx2.pth"

convert:
  - script: convert.py
    args:
      checkpoint: "{temp}/BSRGAN.pth"
      output: "{output}/model_x4.onnx"
      scale: 4
      opset: 17
  - script: convert.py
    args:
      checkpoint: "{temp}/BSRGANx2.pth"
      output: "{output}/model_x2.onnx"
      scale: 2
      opset: 17
