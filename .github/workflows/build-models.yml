name: Build and Publish Models

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.find.outputs.models }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - id: find
        name: Discover models
        run: |
          models=$(uv run dtai list --json-output)
          echo "models=$models" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.discover.outputs.models) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group all-models

      - name: Download checkpoints
        run: uv run dtai setup ${{ matrix.model }}

      - name: Convert to ONNX
        run: uv run dtai convert ${{ matrix.model }}

      - name: Validate output
        run: uv run dtai validate ${{ matrix.model }}

      - name: Package model
        run: uv run dtai package ${{ matrix.model }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.model }}
          path: output/${{ matrix.model }}.dtmodel

  publish:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for pkg in artifacts/*/*.dtmodel; do
            echo "Uploading $(basename "$pkg")..."
            gh release upload "${{ github.event.release.tag_name }}" "$pkg" --repo "$GH_REPO"
          done
